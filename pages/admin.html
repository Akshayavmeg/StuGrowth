<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuGrowth - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">StuGrowth</div>
            <div class="nav-btn-group">
                <button class="btn-nav-outline" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <button class="btn-logout"       onclick="window.location.href='../index.html'">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="dashboard-welcome">
        <h1>Admin Dashboard</h1>
        <p>View student profile data stored in this browser</p>
    </section>

    <!-- Admin Content -->
    <section class="admin-section">

        <!-- Profile Data Card — filled by loadAdmin() in script.js -->
        <div class="admin-card" id="admin-card">

            <!-- Content is injected by JavaScript below -->
            <!-- Shows profile rows if data exists,
                 or a "no profile" message if nothing is saved -->

        </div>

        <!-- Back button -->
        <div class="admin-back-wrapper">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
        </div>

    </section>

    <script src="../js/script.js"></script>

    <script>
        // Run loadAdmin() once the page and script.js are fully loaded
        window.onload = function() {
            loadAdmin();
        };
    </script>

</body>
</html>
